name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Verify module
        run: go mod verify

      - name: Build
        run: go build -o /dev/null ./cmd/launcher

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...
